name: Node.js CI & Deploy

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Setup environment variables
        run: |
          echo "${{ secrets.CYNOGUARD_SECRETS }}" > .env
          # Fix FIREBASE_PRIVATE_KEY newlines — replace literal n back to \n
          python3 - <<'EOF'
          import re

          with open(".env", "r") as f:
              content = f.read()

          # Fix spaces around = for all keys
          content = re.sub(r'(\w+)\s*=\s*', r'\1=', content)

          # Fix FIREBASE_PRIVATE_KEY: wrap in quotes and restore \n
          def fix_key(match):
              key_val = match.group(1)
              # Remove surrounding quotes if any
              key_val = key_val.strip('"').strip("'")
              # Restore \n as real newlines
              key_val = key_val.replace('\\n', '\n').replace('\r', '')
              # Re-wrap in double quotes with literal \n for dotenv
              key_val = key_val.replace('\n', '\\n')
              return f'FIREBASE_PRIVATE_KEY="{key_val}"'

          content = re.sub(r'FIREBASE_PRIVATE_KEY=(.+)', fix_key, content)

          with open(".env", "w") as f:
              f.write(content)

          print("✅ .env fixed")
          EOF

      - name: Install dependencies
        run: NODE_ENV=development npm ci --ignore-scripts --include=dev

      - name: Prisma generate
        run: ./node_modules/.bin/prisma generate

      - name: Build
        run: npm run build --if-present

      - name: Download AWS RDS Certificate
        run: |
          if [ ! -f /home/ubuntu/rds-ca.pem ]; then
            wget https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem \
              -O /home/ubuntu/rds-ca.pem
            echo "✅ RDS cert downloaded"
          else
            echo "✅ RDS cert already exists"
          fi

      - name: Run DB migrations
        run: ./node_modules/.bin/prisma migrate deploy

      - name: Start or Reload PM2
        run: |
          pm2 start ecosystem.config.cjs --only api --update-env || \
          pm2 reload ecosystem.config.cjs --only api --update-env

      - name: Save PM2 process list
        run: pm2 save
