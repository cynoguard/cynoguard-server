name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install dependencies cleanly
      - run: npm ci

      # Generate Prisma client
      - run: npx prisma generate

      # Build TypeScript code
      - run: npm run build --if-present

      # Set up environment variables
      - run: |
          touch .env
          echo "${{ secrets.CYNOGUARD_SECRETS }}" > .env

      # Migrate Prisma
      - run: npx prisma migrate deploy

      # Start or reload PM2 safely (handles first deploy + subsequent deploys)
      - name: Start or Reload PM2
        run: |
          pm2 start ecosystem.config.cjs --only api --update-env || \
          pm2 reload ecosystem.config.cjs --only api --update-env